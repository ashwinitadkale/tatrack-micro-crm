<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TATRACK{% endblock %} — Tattoo CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0B0B0B;
            --ink-deep: #050505;
            --ink-mid: #111111;
            --ink-surface: #181818;
            --ink-raised: #222222;
            --ink-border: #2a2a2a;
            --neon-red: #FF3B3B;
            --neon-red-dim: rgba(255,59,59,0.15);
            --neon-red-glow: rgba(255,59,59,0.4);
            --purple: #7C3AED;
            --purple-dim: rgba(124,58,237,0.15);
            --purple-glow: rgba(124,58,237,0.4);
            --amber: #F59E0B;
            --amber-dim: rgba(245,158,11,0.12);
            --green: #10B981;
            --green-dim: rgba(16,185,129,0.12);
            --text-primary: #F5F5F5;
            --text-secondary: #888888;
            --text-muted: #555555;
            --font-display: 'Bebas Neue', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --radius: 8px;
            --radius-lg: 14px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            background: var(--ink-deep);
            color: var(--text-primary);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(124,58,237,0.08) 0%, transparent 60%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.012'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 240px;
            min-height: 100vh;
            background: var(--ink-mid);
            border-right: 1px solid var(--ink-border);
            display: flex;
            flex-direction: column;
            position: fixed;
            left: 0; top: 0; bottom: 0;
            z-index: 100;
            padding: 0;
            transition: var(--transition);
        }

        .sidebar-brand {
            padding: 28px 24px 20px;
            border-bottom: 1px solid var(--ink-border);
        }
        .sidebar-brand .logo-text {
            font-family: var(--font-display);
            font-size: 2rem;
            letter-spacing: 4px;
            color: var(--text-primary);
            line-height: 1;
        }
        .sidebar-brand .logo-sub {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 4px;
            font-family: var(--font-mono);
        }
        .brand-dot {
            display: inline-block;
            width: 8px; height: 8px;
            background: var(--neon-red);
            border-radius: 50%;
            margin-right: 2px;
            box-shadow: 0 0 8px var(--neon-red-glow);
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,100% { opacity:1; box-shadow: 0 0 8px var(--neon-red-glow); }
            50% { opacity:0.6; box-shadow: 0 0 16px var(--neon-red-glow); }
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-muted);
            padding: 12px 12px 6px;
            font-family: var(--font-mono);
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: var(--radius);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .nav-link::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: var(--neon-red);
            border-radius: 0 2px 2px 0;
            transform: scaleY(0);
            transition: transform 0.2s ease;
        }
        .nav-link:hover {
            background: var(--ink-raised);
            color: var(--text-primary);
        }
        .nav-link.active {
            background: var(--neon-red-dim);
            color: var(--text-primary);
        }
        .nav-link.active::before { transform: scaleY(1); }
        .nav-icon { font-size: 1.1rem; width: 20px; text-align: center; }
        .nav-badge {
            margin-left: auto;
            background: var(--neon-red);
            color: white;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 99px;
            font-family: var(--font-mono);
            min-width: 18px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 16px 12px;
            border-top: 1px solid var(--ink-border);
        }
        .user-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius);
            background: var(--ink-raised);
        }
        .user-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--purple), var(--neon-red));
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 700; color: white;
            flex-shrink: 0;
        }
        .user-name { font-size: 0.8rem; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-role { font-size: 0.65rem; color: var(--text-muted); font-family: var(--font-mono); }
        .logout-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            transition: var(--transition);
            padding: 4px;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .logout-btn:hover { color: var(--neon-red); background: var(--neon-red-dim); }

        /* ── Main content ── */
        .main-content {
            margin-left: 240px;
            flex: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .page-header {
            padding: 32px 40px 20px;
            border-bottom: 1px solid var(--ink-border);
            background: var(--ink-mid);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }
        .page-title {
            font-family: var(--font-display);
            font-size: 2.2rem;
            letter-spacing: 2px;
            color: var(--text-primary);
            line-height: 1;
        }
        .page-subtitle { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; font-family: var(--font-mono); }

        .page-body { padding: 32px 40px; flex: 1; }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: var(--radius);
            font-family: var(--font-body);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: var(--transition);
            text-decoration: none;
            white-space: nowrap;
        }
        .btn-primary {
            background: var(--neon-red);
            color: white;
            box-shadow: 0 0 20px var(--neon-red-dim);
        }
        .btn-primary:hover {
            background: #ff5252;
            box-shadow: 0 0 30px var(--neon-red-glow);
            transform: translateY(-1px);
        }
        .btn-primary:active { transform: translateY(0); }
        .btn-secondary {
            background: var(--ink-raised);
            color: var(--text-secondary);
            border: 1px solid var(--ink-border);
        }
        .btn-secondary:hover { background: #2d2d2d; color: var(--text-primary); border-color: #444; }
        .btn-ghost { background: transparent; color: var(--text-secondary); }
        .btn-ghost:hover { background: var(--ink-raised); color: var(--text-primary); }
        .btn-danger { background: transparent; color: var(--neon-red); border: 1px solid var(--neon-red-dim); }
        .btn-danger:hover { background: var(--neon-red-dim); }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
        .btn-icon { padding: 8px; border-radius: var(--radius); background: var(--ink-raised); color: var(--text-secondary); border: 1px solid var(--ink-border); cursor: pointer; transition: var(--transition); }
        .btn-icon:hover { color: var(--text-primary); border-color: #444; }

        /* ── Cards ── */
        .card {
            background: var(--ink-surface);
            border: 1px solid var(--ink-border);
            border-radius: var(--radius-lg);
            transition: var(--transition);
        }
        .card:hover { border-color: #333; }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,59,59,0.1);
        }
        .card-body { padding: 20px; }
        .card-header { padding: 16px 20px; border-bottom: 1px solid var(--ink-border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .card-title { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--text-secondary); font-family: var(--font-mono); }

        /* ── Stat cards ── */
        .stat-card {
            background: var(--ink-surface);
            border: 1px solid var(--ink-border);
            border-radius: var(--radius-lg);
            padding: 22px;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }
        .stat-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
        }
        .stat-card.red::after { background: linear-gradient(90deg, var(--neon-red), transparent); }
        .stat-card.purple::after { background: linear-gradient(90deg, var(--purple), transparent); }
        .stat-card.amber::after { background: linear-gradient(90deg, var(--amber), transparent); }
        .stat-card.green::after { background: linear-gradient(90deg, var(--green), transparent); }
        .stat-card:hover { transform: translateY(-2px); border-color: #333; }
        .stat-icon { font-size: 1.8rem; margin-bottom: 12px; }
        .stat-value { font-family: var(--font-display); font-size: 2.8rem; line-height: 1; letter-spacing: 1px; }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-top: 6px; font-family: var(--font-mono); }

        /* ── Status badges ── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: var(--font-mono);
        }
        .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
        .badge-new { background: rgba(99,102,241,0.15); color: #818CF8; }
        .badge-contacted { background: rgba(14,165,233,0.15); color: #38BDF8; }
        .badge-consulted { background: var(--amber-dim); color: var(--amber); }
        .badge-booked { background: var(--purple-dim); color: #A78BFA; }
        .badge-completed { background: var(--green-dim); color: var(--green); }
        .badge-lost { background: rgba(100,100,100,0.15); color: #666; }
        .badge-scheduled { background: var(--purple-dim); color: #A78BFA; }
        .badge-cancelled { background: var(--neon-red-dim); color: var(--neon-red); }
        .badge-rescheduled { background: var(--amber-dim); color: var(--amber); }
        .badge-deposit_pending { background: var(--amber-dim); color: var(--amber); }
        .badge-deposit_received { background: var(--purple-dim); color: #A78BFA; }
        .badge-fully_paid { background: var(--green-dim); color: var(--green); }
        .badge-overdue { background: var(--neon-red-dim); color: var(--neon-red); }
        .badge-today { background: var(--purple-dim); color: #A78BFA; }

        /* ── Forms ── */
        .form-group { margin-bottom: 18px; }
        .form-label { display: block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-secondary); margin-bottom: 7px; font-family: var(--font-mono); }
        .form-control {
            width: 100%;
            background: var(--ink-raised);
            border: 1px solid var(--ink-border);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: var(--radius);
            font-family: var(--font-body);
            font-size: 0.9rem;
            transition: var(--transition);
            outline: none;
        }
        .form-control::placeholder { color: var(--text-muted); }
        .form-control:focus { border-color: var(--neon-red); box-shadow: 0 0 0 3px var(--neon-red-dim); }
        select.form-control option { background: var(--ink-raised); }
        textarea.form-control { resize: vertical; min-height: 80px; }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.15s ease;
        }
        .modal-overlay.open { display: flex; }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        .modal {
            background: var(--ink-surface);
            border: 1px solid var(--ink-border);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 520px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--ink-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-title { font-family: var(--font-display); font-size: 1.5rem; letter-spacing: 2px; }
        .modal-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.4rem; transition: var(--transition); padding: 4px; line-height: 1; }
        .modal-close:hover { color: var(--neon-red); }
        .modal-body { padding: 24px; }
        .modal-footer { padding: 16px 24px; border-top: 1px solid var(--ink-border); display: flex; justify-content: flex-end; gap: 10px; }

        /* ── Table ── */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        thead tr { border-bottom: 1px solid var(--ink-border); }
        th { padding: 10px 16px; text-align: left; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); font-family: var(--font-mono); font-weight: 500; white-space: nowrap; }
        td { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.875rem; vertical-align: middle; }
        tbody tr { transition: var(--transition); }
        tbody tr:hover { background: rgba(255,255,255,0.02); }
        .td-name { font-weight: 600; color: var(--text-primary); }
        .td-muted { color: var(--text-secondary); font-size: 0.8rem; }
        .td-mono { font-family: var(--font-mono); font-size: 0.8rem; }
        .td-actions { display: flex; gap: 6px; }

        /* ── Toast ── */
        .toast-container { position: fixed; bottom: 28px; right: 28px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            background: var(--ink-raised);
            border: 1px solid var(--ink-border);
            border-left: 3px solid var(--green);
            border-radius: var(--radius);
            padding: 12px 16px;
            font-size: 0.85rem;
            color: var(--text-primary);
            min-width: 260px;
            max-width: 380px;
            animation: slideInRight 0.3s ease;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .toast.error { border-left-color: var(--neon-red); }
        .toast.warning { border-left-color: var(--amber); }
        @keyframes slideInRight { from { transform: translateX(40px); opacity:0; } to { transform: translateX(0); opacity:1; } }

        /* ── Skeleton ── */
        .skeleton { background: linear-gradient(90deg, var(--ink-raised) 25%, #2a2a2a 50%, var(--ink-raised) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* ── Grid ── */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

        /* ── Empty state ── */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.3; }
        .empty-state p { font-size: 0.9rem; margin-top: 8px; }

        /* ── Divider ── */
        .divider { height: 1px; background: var(--ink-border); margin: 20px 0; }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .main-content { margin-left: 0; }
            .page-body { padding: 20px; }
            .page-header { padding: 20px; }
            .grid-4, .grid-3 { grid-template-columns: 1fr 1fr; }
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--ink-mid); }
        ::-webkit-scrollbar-thumb { background: var(--ink-border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

        /* Page fade-in */
        .page-enter { animation: pageEnter 0.3s ease; }
        @keyframes pageEnter { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    {% block extra_styles %}{% endblock %}
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="logo-text"><span class="brand-dot"></span>TATRACK</div>
            <div class="logo-sub">Tattoo CRM</div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-label">Workspace</div>
            <a href="/dashboard" class="nav-link {% if request.path == '/dashboard' %}active{% endif %}">
                <span class="nav-icon">⬡</span> Dashboard
            </a>
            <a href="/inquiries" class="nav-link {% if request.path == '/inquiries' %}active{% endif %}">
                <span class="nav-icon">✦</span> Inquiries
            </a>
            <div class="nav-label">Schedule</div>
            <a href="/sessions" class="nav-link {% if request.path == '/sessions' %}active{% endif %}">
                <span class="nav-icon">◈</span> Sessions
            </a>
            <a href="/reminders" class="nav-link {% if request.path == '/reminders' %}active{% endif %}">
                <span class="nav-icon">◉</span> Reminders
                <span class="nav-badge" id="reminder-badge" style="display:none">0</span>
            </a>
            <div class="nav-label">Finance</div>
            <a href="/payments" class="nav-link {% if request.path == '/payments' %}active{% endif %}">
                <span class="nav-icon">◇</span> Payments
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-pill">
                <div class="user-avatar" id="user-avatar">?</div>
                <div>
                    <div class="user-name" id="user-name">Loading…</div>
                    <div class="user-role">Tattoo Artist</div>
                </div>
                <button class="logout-btn" onclick="doLogout()" title="Logout">↪</button>
            </div>
        </div>
    </aside>

    <!-- Main -->
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ── Toast ──
        function showToast(msg, type='success') {
            const el = document.createElement('div');
            el.className = 'toast' + (type === 'error' ? ' error' : type === 'warning' ? ' warning' : '');
            el.textContent = msg;
            document.getElementById('toastContainer').appendChild(el);
            setTimeout(() => el.style.opacity = '0', 2800);
            setTimeout(() => el.remove(), 3100);
        }

        // ── Logout ──
        async function doLogout() {
            await fetch('/api/logout', {method:'POST'});
            window.location.href = '/login';
        }

        // ── Load user info ──
        async function loadUserInfo() {
            try {
                const r = await fetch('/api/dashboard/stats');
                if (r.ok) {
                    // user is logged in
                } else {
                    window.location.href = '/login';
                    return;
                }
            } catch(e) {}
            // Pull from session
            const emailEl = document.getElementById('user-name');
            const avatarEl = document.getElementById('user-avatar');
            // Try to get from a lightweight endpoint
            fetch('/api/inquiries').then(r => {
                if (!r.ok) window.location.href = '/login';
            });
        }

        // ── Reminder badge ──
        async function loadReminderBadge() {
            try {
                const r = await fetch('/api/reminders/today');
                if (!r.ok) return;
                const data = await r.json();
                const badge = document.getElementById('reminder-badge');
                if (data.length > 0) {
                    badge.textContent = data.length;
                    badge.style.display = 'inline-block';
                }
            } catch(e) {}
        }

        // ── Modal helpers ──
        function openModal(id) {
            document.getElementById(id).classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        function closeModal(id) {
            document.getElementById(id).classList.remove('open');
            document.body.style.overflow = '';
        }
        // Close on overlay click
        document.querySelectorAll('.modal-overlay').forEach(m => {
            m.addEventListener('click', e => { if (e.target === m) closeModal(m.id); });
        });

        // ── Badge helper ──
        function getBadgeClass(status) {
            const map = {
                new:'badge-new', contacted:'badge-contacted', consulted:'badge-consulted',
                booked:'badge-booked', completed:'badge-completed', lost:'badge-lost',
                scheduled:'badge-scheduled', cancelled:'badge-cancelled', rescheduled:'badge-rescheduled',
                deposit_pending:'badge-deposit_pending', deposit_received:'badge-deposit_received', fully_paid:'badge-fully_paid',
            };
            return map[status] || 'badge-new';
        }

        function fmtPrice(v) {
            if (!v && v !== 0) return '—';
            return '₹' + Number(v).toLocaleString('en-IN');
        }

        function fmtDate(d) {
            if (!d) return '—';
            return new Date(d + 'T00:00:00').toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'});
        }

        loadReminderBadge();
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
