services:
  - type: web
    name: tatrack
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: tatrack-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: tatrack-db
    plan: free
    databaseName: tatrack
    user: tatrack_user