<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TATRACK — Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink-deep:#050505;--ink-mid:#111111;--ink-raised:#222222;--ink-border:#2a2a2a;--ink-surface:#181818;
            --neon-red:#FF3B3B;--neon-red-dim:rgba(255,59,59,0.15);--neon-red-glow:rgba(255,59,59,0.4);
            --purple:#7C3AED;--purple-dim:rgba(124,58,237,0.15);
            --text-primary:#F5F5F5;--text-secondary:#888888;--text-muted:#555555;
            --font-display:'Bebas Neue',sans-serif;--font-body:'Space Grotesk',sans-serif;--font-mono:'JetBrains Mono',monospace;
            --radius:8px;--transition:all 0.2s cubic-bezier(0.4,0,0.2,1);
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--ink-deep);color:var(--text-primary);font-family:var(--font-body);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;
        background-image:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(124,58,237,0.1) 0%, transparent 60%);}
        .register-card{background:var(--ink-surface);border:1px solid var(--ink-border);border-radius:16px;width:100%;max-width:460px;padding:44px 40px;}
        .form-logo{font-family:var(--font-display);font-size:2rem;letter-spacing:4px;margin-bottom:4px;}
        .form-logo span{color:var(--neon-red);text-shadow:0 0 20px var(--neon-red-glow);}
        .form-welcome{font-size:1.5rem;font-weight:700;margin-bottom:4px;}
        .form-welcome-sub{font-size:0.85rem;color:var(--text-muted);margin-bottom:32px;}
        .form-group{margin-bottom:16px;}
        .form-label{display:block;font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-secondary);margin-bottom:7px;font-family:var(--font-mono);}
        .form-control{width:100%;background:var(--ink-raised);border:1px solid var(--ink-border);color:var(--text-primary);padding:11px 14px;border-radius:var(--radius);font-family:var(--font-body);font-size:0.9rem;transition:var(--transition);outline:none;}
        .form-control::placeholder{color:var(--text-muted);}
        .form-control:focus{border-color:var(--neon-red);box-shadow:0 0 0 3px var(--neon-red-dim);}
        .btn-auth{width:100%;padding:13px;background:var(--neon-red);color:white;border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:0.95rem;font-weight:700;cursor:pointer;transition:var(--transition);letter-spacing:1px;margin-top:8px;box-shadow:0 0 20px var(--neon-red-dim);}
        .btn-auth:hover{background:#ff5252;box-shadow:0 0 30px var(--neon-red-glow);transform:translateY(-1px);}
        .btn-auth:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
        .form-switch{text-align:center;margin-top:24px;font-size:0.85rem;color:var(--text-muted);}
        .form-switch a{color:var(--neon-red);text-decoration:none;font-weight:600;}
        .form-switch a:hover{text-decoration:underline;}
        .form-error{background:var(--neon-red-dim);border:1px solid rgba(255,59,59,0.3);color:var(--neon-red);padding:10px 14px;border-radius:var(--radius);font-size:0.85rem;margin-bottom:16px;display:none;}
        .form-success{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#10B981;padding:10px 14px;border-radius:var(--radius);font-size:0.85rem;margin-bottom:16px;display:none;}
        ::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-track{background:var(--ink-mid);} ::-webkit-scrollbar-thumb{background:var(--ink-border);border-radius:3px;}
    </style>
</head>
<body>
<div class="register-card">
    <div class="form-logo">TAT<span>RACK</span></div>
    <div class="form-welcome">Create account</div>
    <div class="form-welcome-sub">Set up your artist workspace</div>

    <div class="form-error" id="regError"></div>
    <div class="form-success" id="regSuccess"></div>

    <div class="form-group">
        <label class="form-label">Studio / Artist Name</label>
        <input type="text" class="form-control" id="studioName" placeholder="Ink & Iron Studio">
    </div>
    <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" id="regEmail" placeholder="artist@studio.com">
    </div>
    <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="regPassword" placeholder="Min. 6 characters">
    </div>
    <button class="btn-auth" id="regBtn" onclick="doRegister()">CREATE ACCOUNT</button>

    <div class="form-switch">Already have an account? <a href="/login">Sign in →</a></div>
</div>
<script>
    document.getElementById('regPassword').addEventListener('keydown', e => { if(e.key==='Enter') doRegister(); });
    async function doRegister() {
        const btn = document.getElementById('regBtn');
        const err = document.getElementById('regError');
        const ok = document.getElementById('regSuccess');
        err.style.display='none'; ok.style.display='none';
        const studio_name = document.getElementById('studioName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        if (!email || !password) { err.textContent='Email and password required'; err.style.display='block'; return; }
        if (password.length < 6) { err.textContent='Password must be at least 6 characters'; err.style.display='block'; return; }
        btn.disabled=true; btn.textContent='CREATING…';
        try {
            const r = await fetch('/api/register', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password,studio_name})});
            const d = await r.json();
            if (r.ok) { ok.textContent='Account created! Signing you in…'; ok.style.display='block';
                const lr = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
                if (lr.ok) window.location.href='/dashboard';
            } else { err.textContent=d.error||'Registration failed'; err.style.display='block'; btn.disabled=false; btn.textContent='CREATE ACCOUNT'; }
        } catch(e) { err.textContent='Network error'; err.style.display='block'; btn.disabled=false; btn.textContent='CREATE ACCOUNT'; }
    }
</script>
</body>
</html>
